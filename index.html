<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CR Anesthésie</title>

<style>
body {margin:0;font-family:Arial;background:#f2f4f8;height:100vh;overflow:hidden;}
h1{text-align:center;margin:6px;font-size:18px;}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:1fr 1fr;
gap:8px;
height:calc(100vh - 45px);
padding:8px;
}

.card{
background:white;
border-radius:10px;
padding:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
overflow:auto;
}

button.option{
padding:6px;margin:2px;font-size:11px;
border-radius:6px;border:1px solid #ccc;
background:white;cursor:pointer;
}
button.option.active{background:#007bff;color:white;}

textarea{width:100%;height:100%;font-size:13px;}
select,input{width:100%;margin-bottom:5px;}
</style>
</head>

<body>

<h1>CR Anesthésie</h1>

<div class="grid">

<div class="card">
<h3>Date</h3>
<input type="date" id="date">

<h3>Chirurgien</h3>
<select id="chirurgien"></select>

<h3>Anesthésiste</h3>
<select id="anesth"></select>
</div>

<div class="card">
<h3>Spécialité</h3>
<select id="specialite">
<option value="">--</option>
<option value="ortho">Orthopédie</option>
<option value="visc">Viscérale</option>
<option value="uro">Urologie</option>
<option value="gyneco">Gynécologie</option>
<option value="endo">Endoscopie</option>
</select>
</div>

<div class="card">

<h3>Conditionnement</h3>
<button class="option" onclick="toggle(this)">Scope</button>
<button class="option" onclick="toggleKTA(this)">KTA</button>

<div id="ktaOptions" style="display:none;">
<select id="ktaSite">
<option value="">Site</option>
<option value="radial">Radial</option>
<option value="fémoral">Fémoral</option>
</select>

<select id="ktaCote">
<option value="">Côté</option>
<option value="droit">Droit</option>
<option value="gauche">Gauche</option>
</select>
</div>

<h3>Induction</h3>
<button class="option" onclick="toggle(this)">Propofol</button>
<button class="option" onclick="toggle(this)">Etomidate</button>
<button class="option" onclick="toggle(this)">Remifentanil</button>
<button class="option" onclick="toggle(this)">Sufentanil</button>
<button class="option" onclick="toggle(this)">Ketamine</button>

</div>

<div class="card" style="grid-column: span 3;">
<textarea id="resultat"></textarea>
</div>

</div>

<script>

/* DATE */
document.getElementById("date").valueAsDate = new Date();

function formatDateFR(d){
if(!d) return "";
let p=d.split("-");
return p[2]+"/"+p[1]+"/"+p[0];
}

/* ANESTHESISTES */
const anesthesistes = [
"Dr Stéphanie ALBOUY","Dr Guy ARMANDO","Dr Laure BONNET","Dr Mohammed BOUREGBA",
"Dr Jean CATINEAU","Dr Alexandre FERRIERO","Dr Arthur FROHLICH",
"Dr Jean-Philippe GUERIN","Dr Sébastien GHIGLIONE","Dr Léa LEY-GHIGLIONE",
"Dr Lucile LEVASSEUR","Dr Riyad MENADE","Dr Nicolas OPPRECHT",
"Dr Nicolas PARTOUCHE","Pr Bertrand PRUNET","Dr Gildas ROUSSEAU",
"Dr Nicolo SALA","Dr Mathilde SEVERAC","Dr Wajdi SULTAN",
"Dr Daisy TRAN","Dr Rémy WIDEHEM","Dr Félix ZAMARON"
];

/* CHIRURGIENS */
const chirurgiens = {

ortho:["Dr Hugo DARMANTE","Dr Matthieu GHREA","Dr Nicolas GUILLOT","Dr Tristan LASCAR"].sort(),
visc:["Dr Adolfo GAVELLI","Dr Anne DUBOIS-VERDIER","Dr Anna MARMORALE","Dr Hubert PERRIN","Dr Nicoletta AMBROSIANI","Pr Fabrizio PANARO"].sort(),
uro:["Dr Aurélie FLOCH","Dr Maher KECHAOU","Dr Patrick-Julien TREACY","Dr Rafaelle CURSIO","Dr Xavier CARPENTIER"].sort(),
endo:["Dr Alexandre CHARACHON","Dr Daniela AGREFILO","Dr Jean-François DEMARQUAY","Dr Juliette LAVEYSSIERE","Dr Luc DIEZ"].sort(),
gyneco:["Dr Abdi BAFGHI","Dr Guillaume BENOIST","Dr Julia AUMIPHIN","Dr Reda DJAFER","Dr Wafaa EL LAAMOUCHI","Pr Bruno CARBONNE"].sort()

};

/* INIT */
function init(){
let a=document.getElementById("anesth");

let empty=document.createElement("option");
empty.text="-- Sélectionner --";
empty.selected=true;
a.add(empty);

anesthesistes.forEach(n=>{
a.innerHTML+=`<option>${n}</option>`;
});
}
init();

/* SPECIALITE */
document.getElementById("specialite").addEventListener("change",function(){

let spec=this.value;
let chir=document.getElementById("chirurgien");

chir.innerHTML="";

let empty=document.createElement("option");
empty.text="-- Sélectionner --";
empty.selected=true;
chir.add(empty);

if(!chirurgiens[spec]) return;

chirurgiens[spec].forEach(c=>{
chir.innerHTML+=`<option>${c}</option>`;
});

generer();
});

/* TOGGLE */
function toggle(b){
b.classList.toggle("active");
generer();
}

/* KTA */
function toggleKTA(b){
b.classList.toggle("active");
document.getElementById("ktaOptions").style.display=
b.classList.contains("active")?"block":"none";
generer();
}

/* GENERER */
function generer(){

let t="Patient pris en charge au bloc.\n\n";

t+="Date : "+formatDateFR(date.value)+"\n";
t+="Chirurgien : "+chirurgien.value+"\n";
t+="Anesthésiste : "+anesth.value+"\n";

let cond=[];

/* Scope */
if([...document.querySelectorAll(".option.active")]
.some(b=>b.innerText==="Scope")){
cond.push("Mise en place PNI, ECG 3 branches, SpO2");
}

/* KTA */
let kta=[...document.querySelectorAll(".option.active")]
.find(b=>b.innerText==="KTA");

if(kta){
let site=document.getElementById("ktaSite").value;
let cote=document.getElementById("ktaCote").value;

if(site && cote){
cond.push("Cathéter artériel "+site+" "+cote);
}
}

if(cond.length){
t+="Conditionnement : "+cond.join(", ")+"\n";
}

document.getElementById("resultat").value=t;

}

/* EVENTS */
document.querySelectorAll("select,button,input").forEach(e=>{
e.addEventListener("change",generer);
});

</script>

</body>
</html>
