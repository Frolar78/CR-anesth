<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CR Anesthésie</title>

<style>
body{
margin:0;
font-family:Inter, Arial;
background:linear-gradient(135deg,#e6ecf3,#f8fafc);
height:100vh;
overflow:hidden;
}

h1{text-align:center;margin:8px;font-size:20px;}

.container{
display:grid;
grid-template-columns:1fr 1fr 2fr;
gap:12px;
height:100vh;
padding:12px;
box-sizing:border-box;
}

.panel{
background:white;
border-radius:14px;
padding:12px;
box-shadow:0 6px 14px rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
overflow:auto;
}

.section-title{
font-weight:600;
margin-bottom:10px;
font-size:14px;
color:#334155;
border-bottom:1px solid #e2e8f0;
padding-bottom:4px;
}

.row{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-bottom:8px;
align-items:center;
}

label{
min-width:120px;
font-size:12px;
color:#475569;
}

input, select{
padding:6px;
border-radius:6px;
border:1px solid #cbd5e1;
font-size:12px;
}

.perop-row{
display:grid;
grid-template-columns:220px 1fr;
margin-bottom:10px;
align-items:start;
}

.checkbox-line{
display:flex;
flex-wrap:wrap;
gap:6px;
}

.checkbox-line label{
border:1px solid #cbd5e1;
padding:6px 8px;
border-radius:8px;
cursor:pointer;
background:white;
}

.checkbox-line input{
display:none;
}

.checkbox-line input:checked + span{
background:#2563eb;
color:white;
padding:2px 4px;
border-radius:6px;
}

.subbox{
display:none;
margin-top:6px;
gap:6px;
flex-wrap:wrap;
}

.output{
white-space:pre-wrap;
font-size:12px;
background:#020617;
color:#e2e8f0;
padding:12px;
border-radius:10px;
height:100%;
overflow:auto;
font-family:monospace;
}
</style>
</head>

<body>

<h1>CR Anesthésie</h1>

<div class="container">

<!-- IDENTITE -->
<div class="panel">
<div class="section-title">Identité</div>

<div class="row"><label>Date</label><input type="date" id="date"></div>
<div class="row"><label>Opérateur</label><select id="operateur"></select></div>
<div class="row"><label>Anesthésiste</label><select id="anesth"></select></div>
</div>

<!-- GESTE -->
<div class="panel">
<div class="section-title">Geste</div>

<div class="row"><label>Spécialité</label><select id="specialite"><option value="">--</option></select></div>
<div class="row"><label>Geste</label><select id="geste"></select></div>
<div class="row"><label>Côté</label><select id="cote"><option value="">--</option><option>Gauche</option><option>Droite</option></select></div>
<div class="row"><label>Commentaire</label><input id="commentaire"></div>
</div>

<!-- PEROP -->
<div class="panel">
<div class="section-title">Per-opératoire</div>

<!-- CONDITIONNEMENT -->
<div class="perop-row">
Conditionnement
<div class="checkbox-line">
<label><input type="checkbox" id="scope"><span>Scope</span></label>
<label><input type="checkbox" id="vvp"><span>VVP</span></label>
<label><input type="checkbox" id="kta"><span>KTA</span></label>
<label><input type="checkbox" id="ktc"><span>KTC</span></label>
<label><input type="checkbox" id="bis"><span>BIS</span></label>
<label><input type="checkbox" id="tof"><span>TOF</span></label>
</div>
</div>

<!-- INDUCTION -->
<div class="perop-row">
Induction
<div class="checkbox-line">
<label><input type="checkbox" id="propofol"><span>Propofol</span></label>
<label><input type="checkbox" id="etomidate"><span>Etomidate</span></label>
<label><input type="checkbox" id="ketamine"><span>Ketamine</span></label>
<label><input type="checkbox" id="sufentanil"><span>Sufentanil</span></label>
<label><input type="checkbox" id="remifentanil"><span>Remifentanil</span></label>
</div>
</div>

<!-- CURARE -->
<div class="perop-row">
Curare
<div class="checkbox-line">
<label><input type="checkbox" id="curare_aucun"><span>Aucun</span></label>
<label><input type="checkbox" id="atracurium"><span>Atracurium</span></label>
<label><input type="checkbox" id="rocuronium"><span>Rocuronium</span></label>
<label><input type="checkbox" id="celocurine"><span>Celocurine</span></label>
</div>
</div>

<!-- VAS -->
<div class="perop-row">
Voies aériennes supérieures
<div>

<div class="checkbox-line">
<label><input type="checkbox" id="vs"><span>VS</span></label>
<label><input type="checkbox" id="ml"><span>ML</span></label>
<label><input type="checkbox" id="ventilation"><span>Ventilation</span></label>
<label><input type="checkbox" id="iot" onchange="toggleIOT()"><span>IOT</span></label>
</div>

<div class="subbox" id="iotBox">
<input id="cormack" placeholder="Cormack">
<input id="pogo" placeholder="POGO">
<input id="sonde" placeholder="Sonde">
</div>

</div>
</div>

<div class="perop-row">Antibiothérapie <input id="atb"></div>
<div class="perop-row">Entretien <input id="entretien"></div>
<div class="perop-row">Noradrénaline <input id="norad"></div>
<div class="perop-row">Autres <input id="autres"></div>

<hr>
<div class="output" id="resultat"></div>

</div>
</div>

<script>

/* DATE */
date.valueAsDate=new Date();

/* DATA (INCHANGÉES) */
const anesthesistes=["Dr Stéphanie ALBOUY","Dr Guy ARMANDO","Dr Laure BONNET"];
const operateurs={"Chirurgie Orthopédique":["Dr Hugo DARMANTE"],"Chirurgie Viscérale":["Dr Adolfo GAVELLI"]};
const gestes={"Chirurgie Orthopédique":{"PTH":{cote:true}},"Chirurgie Viscérale":{"Appendicectomie":{}}};

/* INIT */
Object.keys(operateurs).forEach(s=>specialite.innerHTML+=`<option>${s}</option>`);
anesthesistes.forEach(a=>anesth.innerHTML+=`<option>${a}</option>`);

/* SPECIALITE */
specialite.addEventListener("change",()=>{
let s=specialite.value;
operateur.innerHTML="";
(operateurs[s]||[]).forEach(o=>operateur.innerHTML+=`<option>${o}</option>`);
geste.innerHTML="";
Object.keys(gestes[s]||{}).forEach(g=>geste.innerHTML+=`<option>${g}</option>`);
});

/* IOT */
function toggleIOT(){
iotBox.style.display = iot.checked ? "flex":"none";
}

/* GENERATION */
function generer(){

let t="";

t+="DATE : "+date.value+"\n";
t+="OPERATEUR : "+operateur.value+"\n";
t+="ANESTHESISTE : "+anesth.value+"\n\n";

t+="GESTE : "+geste.value+"\n\n";

/* VAS */
let vas=[];

if(vs.checked) vas.push("Maintien d’une ventilation spontanée pendant toute la durée du geste");
if(ml.checked) vas.push("Mise en place d’un masque laryngé");
if(ventilation.checked) vas.push("Ventilation au masque facile");

if(iot.checked){
let txt="Intubation oro-trachéale atraumatique sans bris dentaire";
if(cormack.value) txt+=" - Cormack "+cormack.value;
if(pogo.value) txt+=" - POGO "+pogo.value;
if(sonde.value) txt+=" - Sonde "+sonde.value;
vas.push(txt);
}

t+="Voies aériennes supérieures : "+vas.join(" | ")+"\n";

resultat.innerText=t;
}

document.querySelectorAll("input,select").forEach(e=>e.addEventListener("input",generer));
generer();

</script>

</body>
</html>
