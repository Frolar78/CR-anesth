<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CR Anesthésie PWA</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f6;
height:100vh;
overflow:hidden;
}

h1{
text-align:center;
margin:6px;
font-size:18px;
}

.container{
display:grid;
grid-template-columns: 1fr 1fr 2fr;
gap:10px;
height:100vh;
padding:10px;
box-sizing:border-box;
}

.panel{
background:white;
border-radius:10px;
padding:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
overflow:auto;
display:flex;
flex-direction:column;
}

.section-title{
font-weight:bold;
margin:8px 0;
font-size:14px;
}

.row{
display:flex;
flex-wrap:wrap;
gap:6px;
align-items:center;
margin-bottom:6px;
}

label{
min-width:120px;
font-size:12px;
}

input, select{
font-size:12px;
padding:4px;
}

textarea{
font-size:12px;
}

.perop-row{
display:grid;
grid-template-columns: 180px 1fr;
margin-bottom:6px;
align-items:center;
}

.output{
white-space:pre-wrap;
font-size:12px;
background:#0f172a;
color:#d1d5db;
padding:10px;
border-radius:8px;
height:100%;
overflow:auto;
}

.plus{
background:#28a745;
color:white;
border:none;
border-radius:50%;
width:24px;
height:24px;
cursor:pointer;
}
</style>

</head>

<body>

<h1>CR Anesthésie - Bloc</h1>

<div class="container">

<!-- 🟦 IDENTITÉ -->
<div class="panel">

<div class="section-title">Identité</div>

<div class="row">
<label>Date</label>
<input type="date" id="date">
</div>

<div class="row">
<label>Opérateur</label>
<select id="operateur"></select>
</div>

<div class="row">
<label>Anesthésiste</label>
<select id="anesth"></select>
</div>

</div>

<!-- 🟨 GESTE (TOUT CONSERVÉ) -->
<div class="panel">

<div class="section-title">Geste chirurgical</div>

<div class="row">
<label>Spécialité</label>
<select id="specialite"></select>
</div>

<div class="row">
<label>Geste</label>
<select id="geste"></select>
</div>

<div class="row">
<label>Côté</label>
<select id="cote">
<option value="">--</option>
<option value="gauche">Gauche</option>
<option value="droite">Droite</option>
</select>
</div>

<div class="row">
<label>Commentaire</label>
<input id="commentaire">
</div>

<button class="plus" onclick="ajouterGeste()">+</button>

<div class="row" id="geste2Block" style="display:none;margin-top:6px;">
<select id="geste2"></select>

<select id="cote2">
<option value="">--</option>
<option value="gauche">Gauche</option>
<option value="droite">Droite</option>
</select>

<input id="commentaire2">
</div>

</div>

<!-- 🟥 PER-OP -->
<div class="panel">

<div class="section-title">Per-opératoire</div>

<div class="perop-row">Conditionnement <input id="cond"></div>
<div class="perop-row">Induction <input id="induction"></div>
<div class="perop-row">Curare <input id="curare"></div>
<div class="perop-row">Voies aériennes supérieures <input id="va"></div>
<div class="perop-row">Antibiothérapie <input id="atb"></div>
<div class="perop-row">Entretien <input id="entretien"></div>
<div class="perop-row">Noradrénaline <input id="norad"></div>
<div class="perop-row">Autres <input id="autres"></div>

<hr>
<div class="output" id="resultat"></div>

</div>

</div>

<script>

/* DATE */
date.valueAsDate = new Date();

/* =======================
   🔵 TES DONNÉES ORIGINALES (INCHANGÉES)
======================= */

const anesthesistes=[
"Dr Stéphanie ALBOUY","Dr Guy ARMANDO","Dr Laure BONNET","Dr Mohammed BOUREGBA",
"Dr Jean CATINEAU","Dr Alexandre FERRIERO","Dr Arthur FROHLICH",
"Dr Jean-Philippe GUERIN","Dr Sébastien GHIGLIONE","Dr Léa LEY-GHIGLIONE",
"Dr Lucile LEVASSEUR","Dr Riyad MENADE","Dr Nicolas OPPRECHT",
"Dr Nicolas PARTOUCHE","Pr Bertrand PRUNET","Dr Gildas ROUSSEAU",
"Dr Nicolo SALA","Dr Mathilde SEVERAC","Dr Wajdi SULTAN",
"Dr Daisy TRAN","Dr Rémy WIDEHEM","Dr Félix ZAMARON"
];

const operateurs={

"Chirurgie Orthopédique":[
"Dr Hugo DARMANTE","Dr Matthieu GHREA","Dr Nicolas GUILLOT","Dr Tristan LASCAR"
],

"Chirurgie Viscérale":[
"Dr Adolfo GAVELLI","Dr Anne DUBOIS-VERDIER","Dr Anna MARMORALE",
"Dr Hubert PERRIN","Dr Nicoletta AMBROSIANI","Pr Fabrizio PANARO"
],

"Urologie":[
"Dr Aurélie FLOCH","Dr Maher KECHAOU","Dr Patrick-Julien TREACY",
"Dr Rafaelle CURSIO","Dr Xavier CARPENTIER"
],

"Endoscopie Digestive":[
"Dr Alexandre CHARACHON","Dr Daniela AGREFILO",
"Dr Jean-François DEMARQUAY","Dr Juliette LAVEYSSIERE","Dr Luc DIEZ"
],

"Chirurgie Gynécologique":[
"Dr Abdi BAFGHI","Dr Guillaume BENOIST","Dr Julia AUMIPHIN",
"Dr Reda DJAFER","Dr Wafaa EL LAAMOUCHI","Pr Bruno CARBONNE"
],

"Chirurgie ORL":[
"Dr Diane LAZARD","Dr Riad BERGUIGA","Dr Sandrine CANIVET"
],

"Radiologie Interventionnelle":[
"Dr Federico TORRE","Dr Giuseppe GUZZARDI"
],

"Cardiologie Interventionnelle":[
"Dr Gabriel LATCU","Dr Denis GATY"
],

"Chirurgie Maxillo-Faciale":[
"Dr Albert VAN HOVE"
],

"Endoscopie Bronchique":[
"Dr Cécile MAINCENT","Dr Constance BLANDIN"
],

"Chirurgie Esthétique":[
"Dr Marie-Christine MISSANA","Dr Abdi BAFGHI"
]

};

const gestes={

"Chirurgie Viscérale":{
"Appendicectomie":{},
"Colectomie":{cote:true},
"Cholécystectomie":{},
"Segmentectomie Hépatique":{},
"Hernie inguinale":{cote:true},
"Hernie ombilicale":{},
"Duodéno-pancréatectomie céphalique":{},
"Oesophagectomie Lewis-Santy":{}
},

"Chirurgie Orthopédique":{
"Prothèse Totale de Hanche":{cote:true},
"Prothèse Totale de Genou":{cote:true},
"Arthroscopie de Genou":{cote:true},
"Arthroscopie d’épaule":{cote:true},
"Canal carpien":{cote:true},
"Prothèse totale d’épaule":{cote:true},
"Clou gamma":{cote:true},
"Plaque poignet":{cote:true},
"Plaque cheville":{cote:true}
},

"Endoscopie Digestive":{
"Gastroscopie":{},
"Gastroscopie + Coloscopie":{},
"Coloscopie":{},
"ERCP":{},
"Echo-endoscopie":{},
"Mucosectomie":{},
"POEM":{},
"Dissection sous-muqueuse":{}
}

};

/* =======================
   INIT
======================= */

Object.keys(operateurs).forEach(s=>{
specialite.innerHTML += `<option>${s}</option>`;
});

anesthesistes.forEach(a=>{
anesth.innerHTML += `<option>${a}</option>`;
});

/* =======================
   SPECIALITE
======================= */

specialite.addEventListener("change",()=>{

let s = specialite.value;

operateur.innerHTML = "<option>--</option>";
(operateurs[s]||[]).forEach(o=>{
operateur.innerHTML += `<option>${o}</option>`;
});

chargerGestes(geste);

geste.value="";
cote.value="";
commentaire.value="";
geste2Block.style.display="none";

generer();
});

/* charger gestes */
function chargerGestes(sel){
let s = specialite.value;
sel.innerHTML="";
if(!gestes[s]) return;

Object.keys(gestes[s]).forEach(g=>{
sel.innerHTML += `<option>${g}</option>`;
});
}

/* gestes */
geste.addEventListener("change",()=>maj(geste,cote,commentaire));
geste2.addEventListener("change",()=>maj(geste2,cote2,commentaire2));

function maj(g,c,com){
let s = specialite.value;
let conf = gestes[s]?.[g.value] || {};
c.style.display = conf.cote ? "inline" : "none";
com.style.display = "inline";
}

/* ajout geste */
function ajouterGeste(){
geste2Block.style.display="block";
chargerGestes(geste2);
}

/* =======================
   GENERATION
======================= */

function generer(){

let t="";

t+="DATE : "+date.value+"\n";
t+="OPERATEUR : "+operateur.value+"\n";
t+="ANESTHESISTE : "+anesth.value+"\n\n";

t+="GESTE : "+geste.value;
if(cote.value) t+=" ("+cote.value+")";
if(commentaire.value) t+=" - "+commentaire.value;

if(geste2.value){
t+=" + "+geste2.value;
if(cote2.value) t+=" ("+cote2.value+")";
if(commentaire2.value) t+=" - "+commentaire2.value;
}

t+="\n\n--- PER-OPERATOIRE ---\n";
t+="Conditionnement : "+cond.value+"\n";
t+="Induction : "+induction.value+"\n";
t+="Curare : "+curare.value+"\n";
t+="Voies aériennes supérieures : "+va.value+"\n";
t+="Antibiothérapie : "+atb.value+"\n";
t+="Entretien : "+entretien.value+"\n";
t+="Noradrénaline : "+norad.value+"\n";
t+="Autres : "+autres.value+"\n";

resultat.innerText=t;
}

/* auto update */
document.querySelectorAll("input,select").forEach(e=>{
e.addEventListener("input",generer);
});

generer();

</script>

</body>
</html>
