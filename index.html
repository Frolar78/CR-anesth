<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CR Anesthésie</title>

<style>
body {margin:0;font-family:Arial;background:#f2f4f8;height:100vh;overflow:hidden;}
h1{text-align:center;margin:6px;font-size:18px;}

.grid{
display:grid;
grid-template-rows:auto auto 1fr;
gap:8px;
height:100vh;
padding:8px;
}

.card{
background:white;
border-radius:10px;
padding:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.ligne{
display:flex;
align-items:center;
flex-wrap:wrap;
margin-bottom:6px;
}

.ligne strong{min-width:170px;}

button.option{
padding:6px;margin:2px;font-size:12px;
border-radius:6px;border:1px solid #ccc;
background:white;cursor:pointer;
}
button.option.active{background:#c9974d;color:white;}

textarea{width:100%;height:100%;}
select,input{margin:3px;}
</style>
</head>

<body>

<h1>CR Anesthésie</h1>

<div class="grid">

<!-- LIGNE HAUTE -->
<div class="card ligne">

<strong>Date :</strong>
<input type="date" id="date">

<strong>Spécialité :</strong>
<select id="specialite"></select>

<strong>Opérateur :</strong>
<select id="operateur"></select>

<strong>Anesthésiste :</strong>
<select id="anesth"></select>

</div>

<!-- GESTE -->
<div class="card ligne">

<strong>Geste :</strong>

<select id="geste"></select>

<select id="cote" style="display:none;">
<option value="">Côté</option>
<option value="gauche">Gauche</option>
<option value="droite">Droite</option>
</select>

<input id="commentaire" placeholder="Précision..." style="display:none;">

</div>

<!-- RESULTAT -->
<div class="card">
<textarea id="resultat"></textarea>
</div>

</div>

<script>

/* DATE */
date.valueAsDate=new Date();

function formatDateFR(d){
if(!d)return"";
let p=d.split("-");
return p[2]+"/"+p[1]+"/"+p[0];
}

/* ANESTH */
const anesthesistes=[
"Dr Stéphanie ALBOUY","Dr Guy ARMANDO","Dr Laure BONNET","Dr Mohammed BOUREGBA",
"Dr Jean CATINEAU","Dr Alexandre FERRIERO","Dr Arthur FROHLICH",
"Dr Jean-Philippe GUERIN","Dr Sébastien GHIGLIONE","Dr Léa LEY-GHIGLIONE",
"Dr Lucile LEVASSEUR","Dr Riyad MENADE","Dr Nicolas OPPRECHT",
"Dr Nicolas PARTOUCHE","Pr Bertrand PRUNET","Dr Gildas ROUSSEAU",
"Dr Nicolo SALA","Dr Mathilde SEVERAC","Dr Wajdi SULTAN",
"Dr Daisy TRAN","Dr Rémy WIDEHEM","Dr Félix ZAMARON"
];

/* OPERATEURS PAR SPECIALITE */
const operateurs={

"Chirurgie ORL":[
"Dr Diane LAZARD","Dr Riad BERGUIGA","Dr Sandrine CANIVET"
],

"Radiologie Interventionnelle":[
"Dr Federico TORRE","Dr Giuseppe GUZZARDI"
],

"Cardiologie Interventionnelle":[
"Dr Gabriel LATCU","Dr Denis GATY"
],

"Chirurgie Maxillo-Faciale":[
"Dr Albert VAN HOVE"
],

"Endoscopie Bronchique":[
"Dr Cécile MAINCENT","Dr Constance BLANDIN"
],

"Chirurgie Esthétique":[
"Dr Marie-Christine MISSANA","Dr Abdi BAFGHI"
]

};

/* GESTES */
const gestes={

"Chirurgie Viscérale":{
"Appendicectomie":{},
"Colectomie":{cote:true},
"Cholécystectomie":{},
"Segmentectomie Hépatique":{commentaire:true},
"Hernie inguinale":{cote:true},
"Hernie ombilicale":{},
"Duodéno-pancréatectomie céphalique":{},
"Oesophagectomie Lewis-Santy":{}
}

};

/* SPECIALITES LISTE */
const specialites=[
"Chirurgie Viscérale","Chirurgie Orthopédique","Chirurgie Thoracique",
"Chirurgie ORL","Endoscopie Digestive","Endoscopie Bronchique",
"Chirurgie Gynécologique","Obstétrique","Radiologie Interventionnelle",
"Cardiologie Interventionnelle","Ophtalmologie","Chirurgie Maxillo-Faciale",
"Chirurgie Esthétique"
];

/* INIT */
function init(){

specialites.forEach(s=>{
specialite.innerHTML+=`<option>${s}</option>`;
});

/* anesth */
anesth.innerHTML="<option>--</option>";
anesthesistes.forEach(a=>{
anesth.innerHTML+=`<option>${a}</option>`;
});
}
init();

/* SPECIALITE CHANGE */
specialite.addEventListener("change",function(){

let s=this.value;

/* opérateurs */
operateur.innerHTML="<option>--</option>";
(operateurs[s]||[]).sort().forEach(o=>{
operateur.innerHTML+=`<option>${o}</option>`;
});

/* gestes */
geste.innerHTML="";
if(gestes[s]){
Object.keys(gestes[s]).forEach(g=>{
geste.innerHTML+=`<option>${g}</option>`;
});
}

generer();

});

/* GESTE CHANGE */
geste.addEventListener("change",function(){

let s=specialite.value;
let g=this.value;

let config=gestes[s]?.[g];

cote.style.display=config?.cote?"inline":"none";
commentaire.style.display=config?.commentaire?"inline":"none";

generer();

});

/* GENERER */
function generer(){

let t="Patient pris en charge au bloc.\n\n";

t+="Date : "+formatDateFR(date.value)+"\n";
t+="Opérateur : "+operateur.value+"\n";
t+="Anesthésiste : "+anesth.value+"\n";

/* geste */
let g=geste.value;

if(g){
let txt=g;

if(cote.value) txt+=" ("+cote.value+")";
if(commentaire.value) txt+=" - "+commentaire.value;

t+="Geste : "+txt+"\n";
}

resultat.value=t;

}

document.querySelectorAll("select,input").forEach(e=>{
e.addEventListener("change",generer);
});

</script>

</body>
</html>
