<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CR Anesthésie</title>

<style>
body {
  font-family: Arial;
  background-color: #f5f7fa;
  margin: 0;
  padding: 20px;
}

h1 {
  text-align: center;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

button.option {
  padding: 10px;
  margin: 5px;
  border: 1px solid #ccc;
  border-radius: 8px;
  background: white;
  cursor: pointer;
}

button.option.active {
  background: #007bff;
  color: white;
}

textarea {
  width: 100%;
  margin-top: 10px;
}

.main-btn {
  width: 100%;
  padding: 15px;
  font-size: 16px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.generate {
  background: #28a745;
  color: white;
}

.copy {
  background: #007bff;
  color: white;
}
</style>

</head>

<body>

<h1>CR Anesthésie</h1>

<div class="card">
<h3>ASA</h3>
<button class="option" onclick="selectOne(this,'asa')">ASA I</button>
<button class="option" onclick="selectOne(this,'asa')">ASA II</button>
<button class="option" onclick="selectOne(this,'asa')">ASA III</button>
<button class="option" onclick="selectOne(this,'asa')">ASA IV</button>
</div>

<div class="card">
<h3>Technique</h3>
<button class="option" onclick="toggle(this)">AG</button>
<button class="option" onclick="toggle(this)">ALR</button>
<button class="option" onclick="toggle(this)">Sédation</button>
<button class="option" onclick="toggle(this)">Intubation</button>
</div>

<div class="card">
<h3>Incidents</h3>
<button class="option" onclick="toggle(this)">Aucun</button>
<button class="option" onclick="toggle(this)">Hypotension</button>
<button class="option" onclick="toggle(this)">Désaturation</button>
</div>

<div class="card">
<h3>Conclusion</h3>
<input type="text" id="conclusion" placeholder="État en SSPI" style="width:100%; padding:10px;">
</div>

<button class="main-btn generate" onclick="generer()">Générer</button>
<button class="main-btn copy" onclick="copier()">Copier</button>

<div class="card">
<h3>Résultat</h3>
<textarea id="resultat" rows="10"></textarea>
</div>

<script>

let selections = {
  asa: "",
  technique: [],
  incidents: []
};

function selectOne(btn, group) {
  let buttons = btn.parentNode.querySelectorAll(".option");
  buttons.forEach(b => b.classList.remove("active"));

  btn.classList.add("active");
  selections[group] = btn.innerText;
}

function toggle(btn) {
  btn.classList.toggle("active");
}

function generer() {
  let texte = "";

  // ASA
  if (selections.asa) {
    texte += "Patient classé " + selections.asa + ".\n\n";
  }

  // TECHNIQUE
  let tech = [];
  document.querySelectorAll(".card:nth-of-type(2) .active").forEach(b => {
    tech.push(b.innerText);
  });

  if (tech.length > 0) {
    texte += "Technique : " + tech.join(", ") + ".\n\n";
  }

  // INCIDENTS
  let incidents = [];
  document.querySelectorAll(".card:nth-of-type(3) .active").forEach(b => {
    incidents.push(b.innerText);
  });

  if (incidents.includes("Aucun")) {
    texte += "Aucun incident per-opératoire.\n\n";
  } else if (incidents.length > 0) {
    texte += "Incidents : " + incidents.join(", ") + ".\n\n";
  }

  // CONCLUSION
  let conclusion = document.getElementById("conclusion").value;
  texte += "Évolution : " + conclusion + ".";

  document.getElementById("resultat").value = texte;
}

function copier() {
  let texte = document.getElementById("resultat");
  texte.select();
  document.execCommand("copy");
  alert("Copié !");
}

</script>

</body>
</html>
