<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CR Anesthésie</title>

<style>
body{
margin:0;
font-family:Inter, Arial;
background:linear-gradient(135deg,#e6ecf3,#f8fafc);
height:100vh;
overflow:hidden;
}

h1{text-align:center;margin:8px;font-size:20px;}

.container{
display:grid;
grid-template-columns:1fr 1fr 2fr;
gap:12px;
height:100vh;
padding:12px;
box-sizing:border-box;
}

.panel{
background:white;
border-radius:14px;
padding:12px;
box-shadow:0 6px 14px rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
overflow:auto;
}

.section-title{
font-weight:600;
margin-bottom:10px;
font-size:14px;
color:#334155;
border-bottom:1px solid #e2e8f0;
padding-bottom:4px;
}

.row{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-bottom:8px;
align-items:center;
}

label{
min-width:120px;
font-size:12px;
color:#475569;
}

input, select{
padding:6px;
border-radius:6px;
border:1px solid #cbd5e1;
font-size:12px;
}

.output{
white-space:pre-wrap;
font-size:12px;
background:#020617;
color:#e2e8f0;
padding:12px;
border-radius:10px;
height:100%;
overflow:auto;
font-family:monospace;
}
</style>
</head>

<body>

<h1>CR Anesthésie</h1>

<div class="container">

<!-- IDENTITE -->
<div class="panel">
<div class="section-title">Identité</div>

<div class="row">
<label>Date</label>
<input type="date" id="date">
</div>

<div class="row">
<label>Spécialité</label>
<select id="specialite"></select>
</div>

<div class="row">
<label>Opérateur</label>
<select id="operateur"></select>
</div>

<div class="row">
<label>Anesthésiste</label>
<select id="anesth"></select>
</div>
</div>

<!-- GESTE -->
<div class="panel">
<div class="section-title">Geste</div>

<div class="row">
<label>Geste</label>
<select id="geste"></select>
</div>

<div class="row">
<label>Côté</label>
<select id="cote">
<option value="">--</option>
<option>Gauche</option>
<option>Droite</option>
</select>
</div>

<div class="row">
<label>Commentaire</label>
<input id="commentaire">
</div>
</div>

<!-- PEROP -->
<div class="panel">
<div class="section-title">Per-opératoire</div>

<div class="row">
<label>Conditionnement</label>
<div>
<label><input type="checkbox" id="scope"> Scope</label>
<label><input type="checkbox" id="vvp"> VVP</label>
<label><input type="checkbox" id="kta"> KTA</label>
<label><input type="checkbox" id="ktc"> KTC</label>
<label><input type="checkbox" id="bis"> BIS</label>
<label><input type="checkbox" id="tof"> TOF</label>
</div>
</div>

<hr>

<div class="output" id="resultat"></div>

</div>

</div>

<script>

/* DATE */
function formatDateFR(d){
if(!d) return "";
let [y,m,day]=d.split("-");
return day+"/"+m+"/"+y;
}
date.valueAsDate=new Date();

/* ================= DATA COMPLET ================= */

const anesthesistes=[
"Dr Stéphanie ALBOUY","Dr Guy ARMANDO","Dr Laure BONNET","Dr Mohammed BOUREGBA",
"Dr Jean CATINEAU","Dr Alexandre FERRIERO","Dr Arthur FROHLICH",
"Dr Jean-Philippe GUERIN","Dr Sébastien GHIGLIONE","Dr Léa LEY-GHIGLIONE",
"Dr Lucile LEVASSEUR","Dr Riyad MENADE","Dr Nicolas OPPRECHT",
"Dr Nicolas PARTOUCHE","Pr Bertrand PRUNET","Dr Gildas ROUSSEAU",
"Dr Nicolo SALA","Dr Mathilde SEVERAC","Dr Wajdi SULTAN",
"Dr Daisy TRAN","Dr Rémy WIDEHEM","Dr Félix ZAMARON"
];

const operateurs={
"Chirurgie Orthopédique":[
"Dr Hugo DARMANTE","Dr Matthieu GHREA","Dr Nicolas GUILLOT","Dr Tristan LASCAR"
],
"Chirurgie Viscérale":[
"Dr Adolfo GAVELLI","Dr Anne DUBOIS-VERDIER","Dr Anna MARMORALE",
"Dr Hubert PERRIN","Dr Nicoletta AMBROSIANI","Pr Fabrizio PANARO"
]
};

const gestes={
"Chirurgie Orthopédique":{
"Prothèse Totale de Hanche":{},
"Prothèse Totale de Genou":{}
},
"Chirurgie Viscérale":{
"Appendicectomie":{},
"Colectomie":{}
}
};

/* ================= INIT ================= */

const specialite=document.getElementById("specialite");
const operateur=document.getElementById("operateur");
const geste=document.getElementById("geste");
const anesth=document.getElementById("anesth");

/* spécialités */
Object.keys(operateurs).forEach(s=>{
specialite.innerHTML+=`<option>${s}</option>`;
});

/* anesth */
anesthesistes.forEach(a=>{
anesth.innerHTML+=`<option>${a}</option>`;
});

/* ================= FONCTIONS ================= */

function majOperateurs(){
let s=specialite.value;
operateur.innerHTML="";
(operateurs[s]||[]).forEach(o=>{
operateur.innerHTML+=`<option>${o}</option>`;
});
}

function majGestes(){
let s=specialite.value;
geste.innerHTML="";
Object.keys(gestes[s]||{}).forEach(g=>{
geste.innerHTML+=`<option>${g}</option>`;
});
}

/* EVENTS */
specialite.addEventListener("change",()=>{
majOperateurs();
majGestes();
generer();
});

/* CONDITIONNEMENT */
function conditionnementText(){

let c=[];

if(scope.checked)
c.push("Conditionnement PNI, ECG 3 branches, SpO2");

if(vvp.checked)
c.push("Voie veineuse périphérique en place");

if(kta.checked)
c.push("Cathéter artériel radial droit");

if(ktc.checked)
c.push("Cathéter veineux central jugulaire interne droit");

if(bis.checked)
c.push("Monitorage BIS en place");

if(tof.checked)
c.push("Monitorage neuromusculaire TOF en place");

return c;
}

/* GENERATION */
function generer(){

let t="";

t+="DATE : "+formatDateFR(date.value)+"\n";
t+="OPERATEUR : "+operateur.value+"\n";
t+="ANESTHESISTE : "+anesth.value+"\n\n";

t+="GESTE : "+geste.value;
if(cote.value) t+=" ("+cote.value+")";
if(commentaire.value) t+=" - "+commentaire.value;

t+="\n\nConditionnement :\n";
conditionnementText().forEach(x=>{
t+="- "+x+"\n";
});

resultat.innerText=t;
}

/* LISTENERS */
document.querySelectorAll("input,select").forEach(e=>{
e.addEventListener("input",generer);
});

/* INIT CALLS */
majOperateurs();
majGestes();
generer();

</script>

</body>
</html>
