<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CR Anesthésie PWA</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f6;
height:100vh;
overflow:hidden;
}

h1{text-align:center;margin:6px;font-size:18px;}

.container{
display:grid;
grid-template-columns: 1fr 1fr 2fr;
gap:10px;
height:100vh;
padding:10px;
box-sizing:border-box;
}

.panel{
background:white;
border-radius:10px;
padding:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
overflow:auto;
display:flex;
flex-direction:column;
}

.section-title{
font-weight:bold;
margin:8px 0;
font-size:14px;
}

.row{
display:flex;
flex-wrap:wrap;
gap:6px;
align-items:center;
margin-bottom:6px;
}

label{
min-width:120px;
font-size:12px;
}

input, select{
font-size:12px;
padding:4px;
}

.perop-row{
display:grid;
grid-template-columns: 220px 1fr;
margin-bottom:8px;
align-items:center;
}

.checkbox-line{
display:flex;
flex-wrap:wrap;
gap:10px;
font-size:12px;
}

.output{
white-space:pre-wrap;
font-size:12px;
background:#0f172a;
color:#d1d5db;
padding:10px;
border-radius:8px;
height:100%;
overflow:auto;
}
</style>

</head>

<body>

<h1>CR Anesthésie - Bloc</h1>

<div class="container">

<!-- IDENTITÉ -->
<div class="panel">
<div class="section-title">Identité</div>

<div class="row">
<label>Date</label>
<input type="date" id="date">
</div>

<div class="row">
<label>Opérateur</label>
<select id="operateur"></select>
</div>

<div class="row">
<label>Anesthésiste</label>
<select id="anesth"></select>
</div>
</div>

<!-- GESTE -->
<div class="panel">
<div class="section-title">Geste chirurgical</div>

<div class="row">
<label>Spécialité</label>
<select id="specialite"></select>
</div>

<div class="row">
<label>Geste</label>
<select id="geste"></select>
</div>

<div class="row">
<label>Côté</label>
<select id="cote">
<option value="">--</option>
<option>Gauche</option>
<option>Droite</option>
</select>
</div>

<div class="row">
<label>Commentaire</label>
<input id="commentaire">
</div>
</div>

<!-- PEROP -->
<div class="panel">
<div class="section-title">Per-opératoire</div>

<div class="perop-row">
Conditionnement
<div class="checkbox-line">
<label><input type="checkbox" id="scope"> Scope</label>
<label><input type="checkbox" id="vvp"> VVP</label>
<label><input type="checkbox" id="kta"> KTA</label>
<label><input type="checkbox" id="ktc"> KTC</label>
<label><input type="checkbox" id="bis"> BIS</label>
<label><input type="checkbox" id="tof"> TOF</label>
</div>
</div>

<div class="perop-row">
Induction
<div class="checkbox-line">
<label><input type="checkbox" id="propofol"> Propofol</label>
<label><input type="checkbox" id="etomidate"> Etomidate</label>
<label><input type="checkbox" id="ketamine"> Ketamine</label>
<label><input type="checkbox" id="sufentanil"> Sufentanil</label>
<label><input type="checkbox" id="remifentanil"> Remifentanil</label>
</div>
</div>

<div class="perop-row">
Curare
<div class="checkbox-line">
<label><input type="checkbox" id="curare_aucun"> Aucun</label>
<label><input type="checkbox" id="atracurium"> Atracurium</label>
<label><input type="checkbox" id="rocuronium"> Rocuronium</label>
<label><input type="checkbox" id="celocurine"> Celocurine</label>
</div>
</div>

<div class="perop-row">Voies aériennes supérieures <input id="va"></div>
<div class="perop-row">Antibiothérapie <input id="atb"></div>
<div class="perop-row">Entretien <input id="entretien"></div>
<div class="perop-row">Noradrénaline <input id="norad"></div>
<div class="perop-row">Autres <input id="autres"></div>

<hr>
<div class="output" id="resultat"></div>
</div>

</div>

<script>

/* DATE */
date.valueAsDate = new Date();

/* DONNÉES (100% CONSERVÉES) */

const anesthesistes=[
"Dr Stéphanie ALBOUY","Dr Guy ARMANDO","Dr Laure BONNET","Dr Mohammed BOUREGBA",
"Dr Jean CATINEAU","Dr Alexandre FERRIERO","Dr Arthur FROHLICH",
"Dr Jean-Philippe GUERIN","Dr Sébastien GHIGLIONE","Dr Léa LEY-GHIGLIONE",
"Dr Lucile LEVASSEUR","Dr Riyad MENADE","Dr Nicolas OPPRECHT",
"Dr Nicolas PARTOUCHE","Pr Bertrand PRUNET","Dr Gildas ROUSSEAU",
"Dr Nicolo SALA","Dr Mathilde SEVERAC","Dr Wajdi SULTAN",
"Dr Daisy TRAN","Dr Rémy WIDEHEM","Dr Félix ZAMARON"
];

const operateurs={
"Chirurgie Orthopédique":["Dr Hugo DARMANTE","Dr Matthieu GHREA","Dr Nicolas GUILLOT","Dr Tristan LASCAR"],
"Chirurgie Viscérale":["Dr Adolfo GAVELLI","Dr Anne DUBOIS-VERDIER","Dr Anna MARMORALE","Dr Hubert PERRIN","Dr Nicoletta AMBROSIANI","Pr Fabrizio PANARO"],
"Urologie":["Dr Aurélie FLOCH","Dr Maher KECHAOU","Dr Patrick-Julien TREACY","Dr Rafaelle CURSIO","Dr Xavier CARPENTIER"],
"Endoscopie Digestive":["Dr Alexandre CHARACHON","Dr Daniela AGREFILO","Dr Jean-François DEMARQUAY","Dr Juliette LAVEYSSIERE","Dr Luc DIEZ"],
"Chirurgie Gynécologique":["Dr Abdi BAFGHI","Dr Guillaume BENOIST","Dr Julia AUMIPHIN","Dr Reda DJAFER","Dr Wafaa EL LAAMOUCHI","Pr Bruno CARBONNE"],
"Chirurgie ORL":["Dr Diane LAZARD","Dr Riad BERGUIGA","Dr Sandrine CANIVET"],
"Radiologie Interventionnelle":["Dr Federico TORRE","Dr Giuseppe GUZZARDI"],
"Cardiologie Interventionnelle":["Dr Gabriel LATCU","Dr Denis GATY"],
"Chirurgie Maxillo-Faciale":["Dr Albert VAN HOVE"],
"Endoscopie Bronchique":["Dr Cécile MAINCENT","Dr Constance BLANDIN"],
"Chirurgie Esthétique":["Dr Marie-Christine MISSANA","Dr Abdi BAFGHI"]
};

const gestes={
"Chirurgie Viscérale":{
"Appendicectomie":{},
"Colectomie":{cote:true},
"Cholécystectomie":{},
"Segmentectomie Hépatique":{},
"Hernie inguinale":{cote:true},
"Hernie ombilicale":{},
"Duodéno-pancréatectomie céphalique":{},
"Oesophagectomie Lewis-Santy":{}
},
"Chirurgie Orthopédique":{
"Prothèse Totale de Hanche":{cote:true},
"Prothèse Totale de Genou":{cote:true},
"Arthroscopie de Genou":{cote:true},
"Arthroscopie d’épaule":{cote:true},
"Canal carpien":{cote:true},
"Prothèse totale d’épaule":{cote:true},
"Clou gamma":{cote:true},
"Plaque poignet":{cote:true},
"Plaque cheville":{cote:true}
},
"Endoscopie Digestive":{
"Gastroscopie":{},
"Gastroscopie + Coloscopie":{},
"Coloscopie":{},
"ERCP":{},
"Echo-endoscopie":{},
"Mucosectomie":{},
"POEM":{},
"Dissection sous-muqueuse":{}
}
};

/* INIT */
Object.keys(operateurs).forEach(s=>{
specialite.innerHTML += `<option>${s}</option>`;
});

anesthesistes.forEach(a=>{
anesth.innerHTML += `<option>${a}</option>`;
});

/* SPECIALITE */
specialite.addEventListener("change",()=>{
let s=specialite.value;

operateur.innerHTML="";
(operateurs[s]||[]).forEach(o=>{
operateur.innerHTML += `<option>${o}</option>`;
});

geste.innerHTML="";
Object.keys(gestes[s]||{}).forEach(g=>{
geste.innerHTML += `<option>${g}</option>`;
});
});

/* GENERATION */
function generer(){

let t="";

t+="DATE : "+date.value+"\n";
t+="OPERATEUR : "+operateur.value+"\n";
t+="ANESTHESISTE : "+anesth.value+"\n\n";

t+="GESTE : "+geste.value;
if(cote.value) t+=" ("+cote.value+")";
if(commentaire.value) t+=" - "+commentaire.value;

t+="\n\n--- PER-OPERATOIRE ---\n";

/* conditionnement */
let cond=[];
if(scope.checked) cond.push("Scope");
if(vvp.checked) cond.push("VVP");
if(kta.checked) cond.push("Cathéter artériel radial droit");
if(ktc.checked) cond.push("Cathéter veineux central jugulaire interne droit");
if(bis.checked) cond.push("BIS");
if(tof.checked) cond.push("TOF");

t+="Conditionnement : "+cond.join(", ")+"\n";

/* induction */
let ind=[];
if(propofol.checked) ind.push("Propofol");
if(etomidate.checked) ind.push("Etomidate");
if(ketamine.checked) ind.push("Ketamine");
if(sufentanil.checked) ind.push("Sufentanil");
if(remifentanil.checked) ind.push("Remifentanil");

t+="Induction : "+ind.join(" + ")+"\n";

/* curare */
let cur=[];
if(curare_aucun.checked){
cur=["Aucun"];
}else{
if(atracurium.checked) cur.push("Atracurium");
if(rocuronium.checked) cur.push("Rocuronium");
if(celocurine.checked) cur.push("Celocurine");
}

t+="Curare : "+cur.join(" + ")+"\n";

t+="Voies aériennes supérieures : "+va.value+"\n";
t+="Antibiothérapie : "+atb.value+"\n";
t+="Entretien : "+entretien.value+"\n";
t+="Noradrénaline : "+norad.value+"\n";
t+="Autres : "+autres.value+"\n";

resultat.innerText=t;
}

/* auto update */
document.querySelectorAll("input,select").forEach(e=>{
e.addEventListener("input",generer);
});

generer();

</script>

</body>
</html>
