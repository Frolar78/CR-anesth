<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CR Anesthésie</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f2f4f8;
  height: 100vh;
  overflow: hidden;
}

h1 {
  text-align: center;
  margin: 8px;
  font-size: 18px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: 1fr 1fr;
  gap: 8px;
  height: calc(100vh - 50px);
  padding: 8px;
  box-sizing: border-box;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 8px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

h3 {
  margin: 5px 0;
  font-size: 13px;
}

select, input {
  width: 100%;
  padding: 5px;
  font-size: 12px;
  margin-bottom: 5px;
}

button.option {
  padding: 6px;
  margin: 2px;
  font-size: 11px;
  border-radius: 6px;
  border: 1px solid #ccc;
  background: white;
  cursor: pointer;
}

button.option.active {
  background: #007bff;
  color: white;
}

textarea {
  width: 100%;
  height: 100%;
  font-size: 12px;
}

.copy {
  width: 100%;
  padding: 8px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 8px;
  margin-top: 5px;
}
</style>
</head>

<body>

<h1>CR Anesthésie</h1>

<div class="grid">

<!-- DATE / CHIR / ANESTH -->
<div class="card">
<h3>Date</h3>
<input type="date" id="date">

<h3>Chirurgien</h3>
<select id="chirurgien"></select>

<h3>Anesthésiste</h3>
<select id="anesth"></select>
</div>

<!-- SPECIALITE / GESTE -->
<div class="card">
<h3>Spécialité</h3>
<select id="specialite">
  <option value="">-- Choisir --</option>
  <option value="ortho">Orthopédie</option>
  <option value="visc">Viscérale</option>
  <option value="vasc">Vasculaire</option>
  <option value="uro">Urologie</option>
  <option value="thor">Thoracique</option>
  <option value="gyneco">Gynécologie</option>
  <option value="endo">Endoscopie</option>
</select>

<h3>Geste</h3>
<select id="geste"></select>

<div id="coteBlock" style="display:none;">
<h3>Côté</h3>
<select id="cote">
  <option value="">--</option>
  <option value="droit">Droit</option>
  <option value="gauche">Gauche</option>
  <option value="bilatéral">Bilatéral</option>
</select>
</div>

<div id="commentaireBlock" style="display:none;">
<h3>Commentaire</h3>
<input type="text" id="commentaire">
</div>
</div>

<!-- TECHNIQUE -->
<div class="card">
<h3>Technique</h3>
<button class="option" onclick="toggle(this)">AG</button>
<button class="option" onclick="toggle(this)">ALR</button>
<button class="option" onclick="toggle(this)">Intubation</button>
<button class="option" onclick="toggle(this)">ML</button>
</div>

<!-- INCIDENTS -->
<div class="card">
<h3>Incidents</h3>
<button class="option" onclick="toggle(this)">Aucun</button>
<button class="option" onclick="toggle(this)">Hypotension</button>
<button class="option" onclick="toggle(this)">Désaturation</button>
</div>

<!-- RESULTAT -->
<div class="card" style="grid-column: span 3;">
<textarea id="resultat"></textarea>
<button class="copy" onclick="copier()">Copier</button>
</div>

</div>

<script>

/* ======================
   DATE
====================== */
document.getElementById("date").valueAsDate = new Date();

/* ======================
   ANESTHÉSISTES
====================== */
const anesthesistes = [
  "Dr Stéphanie ALBOUY",
  "Dr Guy ARMANDO",
  "Dr Laure BONNET",
  "Dr Mohammed BOUREGBA",
  "Dr Jean CATINEAU",
  "Dr Alexandre FERRIERO",
  "Dr Arthur FROHLICH",
  "Dr Jean-Philippe GUERIN",
  "Dr Sébastien GHIGLIONE",
  "Dr Léa LEY-GHIGLIONE",
  "Dr Lucile LEVASSEUR",
  "Dr Riyad MENADE",
  "Dr Nicolas OPPRECHT",
  "Dr Nicolas PARTOUCHE",
  "Pr Bertrand PRUNET",
  "Dr Gildas ROUSSEAU",
  "Dr Nicolo SALA",
  "Dr Mathilde SEVERAC",
  "Dr Wajdi SULTAN",
  "Dr Daisy TRAN",
  "Dr Rémy WIDEHEM",
  "Dr Félix ZAMARON"
];

/* ======================
   DATA COMPLET
====================== */
const data = {

ortho: {
gestes: {
PTG: {label:"Prothèse totale de genou", cote:true},
PTH: {label:"Prothèse totale de hanche", cote:true},
PTE: {label:"Prothèse totale d'épaule", cote:true},
"Arthroscopie genou": {label:"Arthroscopie genou"},
"Arthroscopie épaule": {label:"Arthroscopie épaule"},
"Canal carpien": {label:"Canal carpien", cote:true},
"Clou gamma": {label:"Clou gamma", cote:true}
},
chirurgiens:[
"Dr Matthieu GHREA",
"Dr Nicolas GUILLOT",
"Dr Hugo DARMANTE",
"Dr Tristan LASCAR"
].sort()
},

visc: {
gestes: {
"Lewis Santy": {label:"Lewis-Santy", commentaire:true},
DPC: {label:"Duodénopancréatectomie céphalique"},
Appendicectomie:{label:"Appendicectomie"},
Cholécystectomie:{label:"Cholécystectomie"},
"Hernie inguinale":{label:"Hernie inguinale", cote:true},
"Segmentectomie hépatique":{label:"Segmentectomie hépatique", commentaire:true},
"Hernie ligne blanche":{label:"Hernie ligne blanche"},
"Gastrectomie partielle":{label:"Gastrectomie partielle"},
"Colectomie gauche":{label:"Colectomie gauche"},
"Colectomie droite":{label:"Colectomie droite"}
},
chirurgiens:[
"Dr Adolfo GAVELLI",
"Dr Anne DUBOIS-VERDIER",
"Dr Anna MARMORALE",
"Dr Hubert PERRIN",
"Dr Nicoletta AMBROSIANI",
"Pr Fabrizio PANARO"
].sort()
},

uro:{
gestes:{},
chirurgiens:[
"Dr Aurélie FLOCH",
"Dr Maher KECHAOU",
"Dr Patrick-Julien TREACY",
"Dr Rafaelle CURSIO",
"Dr Xavier CARPENTIER"
].sort()
},

endo:{
gestes:{},
chirurgiens:[
"Dr Alexandre CHARACHON",
"Dr Daniela AGREFILO",
"Dr Jean-François DEMARQUAY",
"Dr Juliette LAVEYSSIERE",
"Dr Luc DIEZ"
].sort()
},

gyneco:{
gestes:{},
chirurgiens:[
"Dr Abdi BAFGHI",
"Dr Guillaume BENOIST",
"Dr Julia AUMIPHIN",
"Dr Reda DJAFER",
"Dr Wafaa EL LAAMOUCHI",
"Pr Bruno CARBONNE"
].sort()
},

vasc:{gestes:{},chirurgiens:["Dr Petit"]},
thor:{gestes:{},chirurgiens:["Dr Roux"]}

};

/* ======================
   INIT
====================== */
function init(){
let anes=document.getElementById("anesth");

anesthesistes.forEach(n=>{
  anes.innerHTML+=`<option>${n}</option>`;
});
}
init();

/* ======================
   SPECIALITE
====================== */
document.getElementById("specialite").addEventListener("change",function(){

let spec=this.value;

let chir=document.getElementById("chirurgien");
let geste=document.getElementById("geste");

chir.innerHTML="";
geste.innerHTML="";

if(!data[spec]) return;

/* chirurgiens */
let empty=document.createElement("option");
empty.value="";
empty.text="-- Sélectionner --";
empty.selected=true;
chir.add(empty);

data[spec].chirurgiens.forEach(c=>{
  chir.innerHTML+=`<option>${c}</option>`;
});

/* gestes */
Object.keys(data[spec].gestes).forEach(k=>{
let opt=document.createElement("option");
opt.value=k;
opt.text=data[spec].gestes[k].label;
geste.add(opt);
});

generer();

});

/* ======================
   GESTE
====================== */
document.getElementById("geste").addEventListener("change",function(){

let spec=document.getElementById("specialite").value;
let key=this.value;

let g=data[spec]?.gestes?.[key];

document.getElementById("coteBlock").style.display=g?.cote?"block":"none";
document.getElementById("commentaireBlock").style.display=g?.commentaire?"block":"none";

generer();

});

/* ======================
   TOGGLE
====================== */
function toggle(b){
b.classList.toggle("active");
generer();
}

/* ======================
   GENERER
====================== */
function generer(){

let texte="Patient pris en charge au bloc opératoire.\n\n";

texte+="Date : "+document.getElementById("date").value+"\n";
texte+="Chirurgien : "+document.getElementById("chirurgien").value+"\n";
texte+="Anesthésiste : "+document.getElementById("anesth").value+"\n";

let spec=document.getElementById("specialite").value;
let key=document.getElementById("geste").value;

if(data[spec]?.gestes?.[key]){

let g=data[spec].gestes[key].label;

let cote=document.getElementById("cote").value;
let com=document.getElementById("commentaire").value;

if(cote) g+=" ("+cote+")";
if(com) g+=" - "+com;

texte+="Geste : "+g+"\n";

}

document.getElementById("resultat").value=texte;

}

/* ======================
   COPIER
====================== */
function copier(){
let t=document.getElementById("resultat");
t.select();
document.execCommand("copy");
alert("Copié !");
}

</script>

</body>
</html>
