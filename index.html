<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CR Anesthésie</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f2f4f8;
  height: 100vh;
  overflow: hidden;
}

h1 {
  text-align: center;
  margin: 10px 0;
  font-size: 20px;
}

/* GRID PRINCIPALE */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap: 10px;
  height: calc(100vh - 60px);
  padding: 10px;
  box-sizing: border-box;
}

/* CARTES */
.card {
  background: white;
  border-radius: 10px;
  padding: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  overflow: hidden;
}

/* TEXTES COMPACTS */
h3 {
  margin: 5px 0;
  font-size: 14px;
}

/* BOUTONS */
button.option {
  padding: 6px;
  margin: 2px;
  font-size: 12px;
  border-radius: 6px;
  border: 1px solid #ccc;
  background: white;
  cursor: pointer;
}

button.option.active {
  background: #007bff;
  color: white;
}

/* SELECTS */
select, input {
  width: 100%;
  padding: 5px;
  font-size: 12px;
  margin-top: 3px;
}

/* RESULTAT */
textarea {
  width: 100%;
  height: 100%;
  font-size: 12px;
}

/* BOUTON COPIER */
.copy {
  width: 100%;
  padding: 8px;
  background: #007bff;
  color: white;
  border: none;
  margin-top: 5px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>CR Anesthésie</h1>

<div class="grid">

<!-- DATE + INTERVENANTS -->
<div class="card">
<h3>Date</h3>
<input type="date" id="date">

<h3>Chirurgien</h3>
<select id="chirurgien">
  <option>Dr Xavier CARPENTIER</option>
  <option>Dr Fabrizio PANARO</option>
  <option>Dr Anne DUBOIS-VERDIER</option>
  
</select>

<h3>Anesthésiste</h3>
<select id="anesth">
  <option>Dr Bernard</option>
  <option>Dr Petit</option>
  <option>Dr Leroy</option>
</select>
</div>

<!-- GESTE -->
<div class="card">
<h3>Geste</h3>

<select id="specialite">
  <option value="">Spécialité</option>
  <option value="ortho">Orthopédie</option>
  <option value="digestif">Digestif</option>
</select>

<select id="geste"></select>
</div>

<!-- TECHNIQUE -->
<div class="card">
<h3>Technique</h3>
<button class="option" onclick="toggle(this)">AG</button>
<button class="option" onclick="toggle(this)">ALR</button>
<button class="option" onclick="toggle(this)">Intubation</button>
<button class="option" onclick="toggle(this)">ML</button>
</div>

<!-- INCIDENTS -->
<div class="card">
<h3>Incidents</h3>
<button class="option" onclick="toggle(this)">Aucun</button>
<button class="option" onclick="toggle(this)">Hypotension</button>
<button class="option" onclick="toggle(this)">Désaturation</button>
</div>

<!-- RESULTAT -->
<div class="card" style="grid-column: span 3;">
<h3>Compte rendu</h3>
<textarea id="resultat"></textarea>
<button class="copy" onclick="copier()">Copier</button>
</div>

</div>

<script>

document.getElementById("date").valueAsDate = new Date();

const gestes = {
  ortho: ["PTH", "PTG", "Arthroscopie genou"],
  digestif: ["Appendicectomie", "Cholécystectomie"]
};

document.getElementById("specialite").addEventListener("change", function() {
  let spec = this.value;
  let select = document.getElementById("geste");

  select.innerHTML = "";

  if (!gestes[spec]) return;

  gestes[spec].forEach(g => {
    let opt = document.createElement("option");
    opt.text = g;
    select.add(opt);
  });

  generer();
});

function toggle(btn) {
  btn.classList.toggle("active");
  generer();
}

function generer() {

  let texte = "";

  texte += "Patient pris en charge au bloc opératoire.\n";
  texte += "Monitorage standard.\n\n";

  texte += "Date : " + document.getElementById("date").value + "\n";
  texte += "Chirurgien : " + document.getElementById("chirurgien").value + "\n";
  texte += "Anesthésiste : " + document.getElementById("anesth").value + "\n";
  texte += "Geste : " + document.getElementById("geste").value + "\n\n";

  let tech = [];
  document.querySelectorAll(".card:nth-of-type(3) .active").forEach(b => tech.push(b.innerText));
  if (tech.length) texte += "Technique : " + tech.join(", ") + ".\n\n";

  let inc = [];
  document.querySelectorAll(".card:nth-of-type(4) .active").forEach(b => inc.push(b.innerText));

  if (inc.includes("Aucun")) {
    texte += "Aucun incident.\n";
  } else if (inc.length) {
    texte += "Incidents : " + inc.join(", ") + ".\n";
  }

  document.getElementById("resultat").value = texte;
}

function copier() {
  let t = document.getElementById("resultat");
  t.select();
  document.execCommand("copy");
  alert("Copié !");
}

document.querySelectorAll("select").forEach(e => e.addEventListener("change", generer));

</script>

</body>
</html>
