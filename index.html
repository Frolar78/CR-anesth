<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CR Anesthésie</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f2f4f8;
  height:100vh;
  overflow:hidden;
}

h1 {
  text-align:center;
  margin:6px;
  font-size:18px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr;
  grid-template-rows:auto auto 1fr;
  gap:8px;
  height:100vh;
  padding:8px;
}

/* CARD */
.card{
  background:white;
  border-radius:10px;
  padding:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* LIGNES TYPE IMAGE */
.ligne {
  display:flex;
  align-items:center;
  flex-wrap:wrap;
  margin-bottom:6px;
}

.ligne strong {
  min-width:160px;
}

/* BOUTONS */
button.option{
  padding:6px;
  margin:2px;
  font-size:12px;
  border-radius:6px;
  border:1px solid #ccc;
  background:white;
  cursor:pointer;
}

button.option.active{
  background:#c9974d;
  color:white;
}

/* SELECT / INPUT */
select,input{
  margin-left:5px;
  margin-right:5px;
}

/* KTA OPTIONS INLINE */
#ktaOptions{
  display:none;
}

/* RESULTAT */
textarea{
  width:100%;
  height:100%;
  font-size:13px;
}
</style>
</head>

<body>

<h1>CR Anesthésie</h1>

<div class="grid">

<!-- HAUT -->
<div class="card ligne">
<strong>Date :</strong>
<input type="date" id="date">

<strong>Chir :</strong>
<select id="chirurgien"></select>

<strong>Anesth :</strong>
<select id="anesth"></select>
</div>

<!-- ANESTHESIE LIGNES -->
<div class="card">

<div class="ligne">
<strong>Conditionnement :</strong>

<button class="option" onclick="toggle(this)">Scope</button>
<button class="option" onclick="toggle(this)">VVP</button>
<button class="option" onclick="toggleKTA(this)">KTA</button>
<button class="option" onclick="toggle(this)">KTC</button>
<button class="option" onclick="toggle(this)">BIS</button>
<button class="option" onclick="toggle(this)">TOF</button>

<span id="ktaOptions">
<select id="ktaSite">
<option value="">Site</option>
<option value="radial">Radial</option>
<option value="fémoral">Fémoral</option>
</select>

<select id="ktaCote">
<option value="">Côté</option>
<option value="droit">Droit</option>
<option value="gauche">Gauche</option>
</select>
</span>

</div>

<div class="ligne">
<strong>Induction :</strong>

<button class="option" onclick="toggle(this)">Propofol</button>
<button class="option" onclick="toggle(this)">Etomidate</button>
<button class="option" onclick="toggle(this)">Remifentanil</button>
<button class="option" onclick="toggle(this)">Sufentanil</button>
<button class="option" onclick="toggle(this)">Ketamine</button>

</div>

</div>

<!-- RESULTAT -->
<div class="card">
<textarea id="resultat"></textarea>
</div>

</div>

<script>

/* DATE */
date.valueAsDate = new Date();

function formatDateFR(d){
if(!d) return "";
let p=d.split("-");
return p[2]+"/"+p[1]+"/"+p[0];
}

/* ANESTHESISTES */
const anesthesistes = [
"Dr Stéphanie ALBOUY","Dr Guy ARMANDO","Dr Laure BONNET","Dr Mohammed BOUREGBA",
"Dr Jean CATINEAU","Dr Alexandre FERRIERO","Dr Arthur FROHLICH",
"Dr Jean-Philippe GUERIN","Dr Sébastien GHIGLIONE","Dr Léa LEY-GHIGLIONE",
"Dr Lucile LEVASSEUR","Dr Riyad MENADE","Dr Nicolas OPPRECHT",
"Dr Nicolas PARTOUCHE","Pr Bertrand PRUNET","Dr Gildas ROUSSEAU",
"Dr Nicolo SALA","Dr Mathilde SEVERAC","Dr Wajdi SULTAN",
"Dr Daisy TRAN","Dr Rémy WIDEHEM","Dr Félix ZAMARON"
];

/* CHIR */
const chirurgiens = {
ortho:["Dr Hugo DARMANTE","Dr Matthieu GHREA","Dr Nicolas GUILLOT","Dr Tristan LASCAR"].sort()
};

/* INIT */
function init(){

let a=anesth;

let empty=document.createElement("option");
empty.text="-- Sélectionner --";
empty.selected=true;
a.add(empty);

anesthesistes.forEach(n=>{
a.innerHTML+=`<option>${n}</option>`;
});

/* chirurgiens (simple pour l’instant) */
let c=chirurgien;
let empty2=document.createElement("option");
empty2.text="-- Sélectionner --";
empty2.selected=true;
c.add(empty2);

chirurgiens.ortho.forEach(n=>{
c.innerHTML+=`<option>${n}</option>`;
});

}
init();

/* TOGGLE */
function toggle(b){
b.classList.toggle("active");
generer();
}

/* KTA */
function toggleKTA(b){
b.classList.toggle("active");
ktaOptions.style.display=b.classList.contains("active")?"inline":"none";
generer();
}

/* GENERER */
function generer(){

let t="Patient pris en charge au bloc.\n\n";

t+="Date : "+formatDateFR(date.value)+"\n";
t+="Chirurgien : "+chirurgien.value+"\n";
t+="Anesthésiste : "+anesth.value+"\n";

/* CONDITIONNEMENT */
let cond=[];

/* Scope */
if([...document.querySelectorAll(".option.active")]
.some(b=>b.innerText==="Scope")){
cond.push("Mise en place PNI, ECG 3 branches, SpO2");
}

/* KTA */
let kta=[...document.querySelectorAll(".option.active")]
.find(b=>b.innerText==="KTA");

if(kta){
let site=ktaSite.value;
let cote=ktaCote.value;

if(site && cote){
cond.push("Cathéter artériel "+site+" "+cote);
}
}

if(cond.length){
t+="Conditionnement : "+cond.join(", ")+"\n";
}

resultat.value=t;

}

/* EVENTS */
document.querySelectorAll("select,button,input").forEach(e=>{
e.addEventListener("change",generer);
});

</script>

</body>
</html>
