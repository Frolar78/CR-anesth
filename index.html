<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CR Anesthésie</title>

<style>
body {
  font-family: Arial;
  background: #f2f4f8;
  margin: 0;
  padding: 15px;
}

h1 {
  text-align: center;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 12px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

select, input {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
}

button.option {
  padding: 8px;
  margin: 4px;
  border-radius: 8px;
  border: 1px solid #ccc;
  background: white;
  cursor: pointer;
}

button.option.active {
  background: #007bff;
  color: white;
}

textarea {
  width: 100%;
  margin-top: 10px;
}

.main-btn {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

.copy {
  background: #007bff;
  color: white;
}
</style>

</head>

<body>

<h1>CR Anesthésie</h1>

<!-- DATE -->
<div class="card">
<h3>Date</h3>
<input type="date" id="date">
</div>

<!-- PRATICIENS -->
<div class="card">
<h3>Intervenants</h3>

<label>Chirurgien :</label>
<select id="chirurgien">
  <option>Dr Dupont</option>
  <option>Dr Martin</option>
  <option>Dr Durand</option>
</select>

<label>Anesthésiste :</label>
<select id="anesth">
  <option>Dr Bernard</option>
  <option>Dr Petit</option>
  <option>Dr Leroy</option>
</select>

</div>

<!-- GESTE -->
<div class="card">
<h3>Geste</h3>

<label>Spécialité :</label>
<select id="specialite" onchange="updateGestes()">
  <option value="">--Choisir--</option>
  <option value="ortho">Orthopédie</option>
  <option value="digestif">Digestif</option>
</select>

<label>Acte :</label>
<select id="geste"></select>

</div>

<!-- TECHNIQUE -->
<div class="card">
<h3>Technique</h3>
<button class="option" onclick="toggle(this)">AG</button>
<button class="option" onclick="toggle(this)">ALR</button>
<button class="option" onclick="toggle(this)">Intubation</button>
<button class="option" onclick="toggle(this)">Masque laryngé</button>
</div>

<!-- INCIDENTS -->
<div class="card">
<h3>Incidents</h3>
<button class="option" onclick="toggle(this)">Aucun</button>
<button class="option" onclick="toggle(this)">Hypotension</button>
<button class="option" onclick="toggle(this)">Désaturation</button>
</div>

<!-- RESULTAT -->
<div class="card">
<h3>Compte rendu</h3>
<textarea id="resultat" rows="12"></textarea>
<button class="main-btn copy" onclick="copier()">Copier</button>
</div>

<script>

// DATE AUTO
document.getElementById("date").valueAsDate = new Date();

// GESTES PAR SPECIALITE
const gestes = {
  ortho: ["PTH", "PTG", "Arthroscopie genou"],
  digestif: ["Appendicectomie", "Cholécystectomie"]
};

function updateGestes() {
  let spec = document.getElementById("specialite").value;
  let select = document.getElementById("geste");

  select.innerHTML = "";

  gestes[spec].forEach(g => {
    let option = document.createElement("option");
    option.text = g;
    select.add(option);
  });

  generer();
}

// BOUTONS
function toggle(btn) {
  btn.classList.toggle("active");
  generer();
}

// GENERATION AUTO
function generer() {

  let date = document.getElementById("date").value;
  let chirurgien = document.getElementById("chirurgien").value;
  let anesth = document.getElementById("anesth").value;
  let geste = document.getElementById("geste").value;

  let texte = "";

  // TRAME FIXE
  texte += "Patient pris en charge au bloc opératoire.\n";
  texte += "Monitorage standard mis en place.\n\n";

  // INFOS
  texte += "Date : " + date + "\n";
  texte += "Chirurgien : " + chirurgien + "\n";
  texte += "Anesthésiste : " + anesth + "\n";
  texte += "Intervention : " + geste + "\n\n";

  // TECHNIQUE
  let tech = [];
  document.querySelectorAll(".card:nth-of-type(4) .active").forEach(b => {
    tech.push(b.innerText);
  });

  if (tech.length > 0) {
    texte += "Technique : " + tech.join(", ") + ".\n\n";
  }

  // INCIDENTS
  let incidents = [];
  document.querySelectorAll(".card:nth-of-type(5) .active").forEach(b => {
    incidents.push(b.innerText);
  });

  if (incidents.includes("Aucun")) {
    texte += "Aucun incident per-opératoire.\n";
  } else if (incidents.length > 0) {
    texte += "Incidents : " + incidents.join(", ") + ".\n";
  }

  document.getElementById("resultat").value = texte;
}

// COPIER
function copier() {
  let texte = document.getElementById("resultat");
  texte.select();
  document.execCommand("copy");
  alert("Copié !");
}

// AUTO UPDATE
document.querySelectorAll("select, input").forEach(el => {
  el.addEventListener("change", generer);
});

</script>

</body>
</html>
