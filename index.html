<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CR Anesthésie</title>

<style>
body {margin:0;font-family:Arial;background:#f2f4f8;height:100vh;overflow:hidden;}
h1{text-align:center;margin:6px;font-size:18px;}

.grid{display:grid;grid-template-rows:auto auto 1fr;gap:8px;height:100vh;padding:8px;}
.card{background:white;border-radius:10px;padding:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
.ligne{display:flex;align-items:center;flex-wrap:wrap;margin-bottom:6px;}
.ligne strong{min-width:170px;}

button.option{padding:6px;margin:2px;font-size:12px;border-radius:6px;border:1px solid #ccc;background:white;cursor:pointer;}
button.option.active{background:#c9974d;color:white;}

.plus{background:#28a745;color:white;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;margin-left:5px;}

textarea{width:100%;height:100%;}
select,input{margin:3px;}
</style>
</head>

<body>

<h1>CR Anesthésie</h1>

<div class="grid">

<div class="card ligne">
<strong>Date :</strong>
<input type="date" id="date">

<strong>Spécialité :</strong>
<select id="specialite"></select>

<strong>Opérateur :</strong>
<select id="operateur"></select>

<strong>Anesthésiste :</strong>
<select id="anesth"></select>
</div>

<div class="card ligne">
<strong>Geste :</strong>

<select id="geste"></select>

<select id="cote" style="display:none;">
<option value="">Côté</option>
<option value="gauche">Gauche</option>
<option value="droite">Droite</option>
</select>

<input id="commentaire" placeholder="Précision..." style="display:none;">

<button class="plus" onclick="ajouterGeste()">+</button>

<span id="secondGesteBlock" style="display:none;">
<select id="geste2"></select>

<select id="cote2" style="display:none;">
<option value="">Côté</option>
<option value="gauche">Gauche</option>
<option value="droite">Droite</option>
</select>

<input id="commentaire2" placeholder="Précision..." style="display:none;">
</span>

</div>

<div class="card">
<textarea id="resultat"></textarea>
</div>

</div>

<script>

/* DATE */
date.valueAsDate = new Date();

function formatDateFR(d){
if(!d) return "";
let p = d.split("-");
return p[2]+"/"+p[1]+"/"+p[0];
}

/* ANESTH (INCHANGÉ) */
const anesthesistes=[
"Dr Stéphanie ALBOUY","Dr Guy ARMANDO","Dr Laure BONNET","Dr Mohammed BOUREGBA",
"Dr Jean CATINEAU","Dr Alexandre FERRIERO","Dr Arthur FROHLICH",
"Dr Jean-Philippe GUERIN","Dr Sébastien GHIGLIONE","Dr Léa LEY-GHIGLIONE",
"Dr Lucile LEVASSEUR","Dr Riyad MENADE","Dr Nicolas OPPRECHT",
"Dr Nicolas PARTOUCHE","Pr Bertrand PRUNET","Dr Gildas ROUSSEAU",
"Dr Nicolo SALA","Dr Mathilde SEVERAC","Dr Wajdi SULTAN",
"Dr Daisy TRAN","Dr Rémy WIDEHEM","Dr Félix ZAMARON"
];

/* OPERATEURS (INCHANGÉ COMPLET) */
const operateurs={

"Chirurgie Orthopédique":[
"Dr Hugo DARMANTE","Dr Matthieu GHREA","Dr Nicolas GUILLOT","Dr Tristan LASCAR"
],

"Chirurgie Viscérale":[
"Dr Adolfo GAVELLI","Dr Anne DUBOIS-VERDIER","Dr Anna MARMORALE",
"Dr Hubert PERRIN","Dr Nicoletta AMBROSIANI","Pr Fabrizio PANARO"
],

"Urologie":[
"Dr Aurélie FLOCH","Dr Maher KECHAOU","Dr Patrick-Julien TREACY",
"Dr Rafaelle CURSIO","Dr Xavier CARPENTIER"
],

"Endoscopie Digestive":[
"Dr Alexandre CHARACHON","Dr Daniela AGREFILO",
"Dr Jean-François DEMARQUAY","Dr Juliette LAVEYSSIERE","Dr Luc DIEZ"
],

"Chirurgie Gynécologique":[
"Dr Abdi BAFGHI","Dr Guillaume BENOIST","Dr Julia AUMIPHIN",
"Dr Reda DJAFER","Dr Wafaa EL LAAMOUCHI","Pr Bruno CARBONNE"
],

"Chirurgie ORL":[
"Dr Diane LAZARD","Dr Riad BERGUIGA","Dr Sandrine CANIVET"
],

"Radiologie Interventionnelle":[
"Dr Federico TORRE","Dr Giuseppe GUZZARDI"
],

"Cardiologie Interventionnelle":[
"Dr Gabriel LATCU","Dr Denis GATY"
],

"Chirurgie Maxillo-Faciale":[
"Dr Albert VAN HOVE"
],

"Endoscopie Bronchique":[
"Dr Cécile MAINCENT","Dr Constance BLANDIN"
],

"Chirurgie Esthétique":[
"Dr Marie-Christine MISSANA","Dr Abdi BAFGHI"
]

};

/* GESTES (INCHANGÉ COMPLET) */
const gestes={

"Chirurgie Viscérale":{
"Appendicectomie":{},
"Colectomie":{cote:true},
"Cholécystectomie":{},
"Segmentectomie Hépatique":{commentaire:true},
"Hernie inguinale":{cote:true},
"Hernie ombilicale":{},
"Duodéno-pancréatectomie céphalique":{},
"Oesophagectomie Lewis-Santy":{}
},

"Chirurgie Orthopédique":{
"Prothèse Totale de Hanche":{cote:true},
"Prothèse Totale de Genou":{cote:true},
"Arthroscopie de Genou":{cote:true},
"Arthroscopie d’épaule":{cote:true},
"Canal carpien":{cote:true},
"Prothèse totale d’épaule":{cote:true},
"Clou gamma":{cote:true},
"Plaque poignet":{cote:true},
"Plaque cheville":{cote:true}
},

"Endoscopie Digestive":{
"Gastroscopie":{},
"Gastroscopie + Coloscopie":{},
"Coloscopie":{},
"ERCP":{},
"Echo-endoscopie":{},
"Mucosectomie":{},
"POEM":{},
"Dissection sous-muqueuse":{}
}

};

/* INIT */
function init(){

Object.keys(operateurs).forEach(s=>{
specialite.innerHTML += `<option>${s}</option>`;
});

anesthesistes.forEach(a=>{
anesth.innerHTML += `<option>${a}</option>`;
});

generer();
}
init();

/* SPECIALITE */
specialite.addEventListener("change", function(){

let s = this.value;

operateur.innerHTML = "<option>--</option>";
(operateurs[s]||[]).sort().forEach(o=>{
operateur.innerHTML += `<option>${o}</option>`;
});

geste.value = "";
cote.value = "";
commentaire.value = "";

secondGesteBlock.style.display = "none";

geste2.value = "";
cote2.value = "";
commentaire2.value = "";

chargerGestes(geste);
generer();
});

/* GESTES */
function chargerGestes(selectEl){
let s = specialite.value;
selectEl.innerHTML = "";
if(!gestes[s]) return;

Object.keys(gestes[s]).forEach(g=>{
selectEl.innerHTML += `<option>${g}</option>`;
});
}

/* OPTIONS */
geste.addEventListener("change", function(){
majOptions(this.value, cote, commentaire);
});

geste2.addEventListener("change", function(){
majOptions(this.value, cote2, commentaire2);
});

/* FIX IMPORTANT */
function majOptions(g, coteEl, comEl){
let s = specialite.value;
let conf = gestes[s]?.[g] || {};

if(coteEl) coteEl.style.display = conf.cote ? "inline" : "none";
if(comEl) comEl.style.display = conf.commentaire ? "inline" : "none";
}

/* AJOUT GESTE */
function ajouterGeste(){
secondGesteBlock.style.display = "inline";
chargerGestes(geste2);
}

/* GENERER */
function generer(){

let t = "Patient pris en charge au bloc.\n\n";

t += "Date : " + formatDateFR(date.value) + "\n";
t += "Opérateur : " + operateur.value + "\n";
t += "Anesthésiste : " + anesth.value + "\n";

let txt = geste.value;

if(cote.value) txt += " ("+cote.value+")";
if(commentaire.value) txt += " - "+commentaire.value;

if(geste2.value){
let txt2 = geste2.value;

if(cote2.value) txt2 += " ("+cote2.value+")";
if(commentaire2.value) txt2 += " - "+commentaire2.value;

txt += " + " + txt2;
}

t += "Geste : " + txt + "\n";

resultat.value = t;
}

/* AUTO UPDATE */
document.querySelectorAll("select,input").forEach(e=>{
e.addEventListener("change", () => setTimeout(generer, 0));
});

</script>

</body>
</html>
